<head>

    <title>IP-RECARGAS</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="manifest" href="manifest.json">

    <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100vh; 
        width: 100vw; 
        overflow: hidden; 
        background-color: #f4f7f9;
    }
    iframe { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        border: none;
        /* Esto ayuda a que el scroll sea fluido en iPhone */
        -webkit-overflow-scrolling: touch;
    }
</style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbxzOy-iR_syc5QgsaaM7P38eVwF2FHmSyDH9Wa2Q8lzRiFVoEQkujHpavXfjp6IO16i/exec"></iframe>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(() => console.log('PWA IP-RECARGAS: Lista y Limpia'))
            .catch(err => console.log('Error:', err));
        });
      }
    </script>
</body>
</html>
